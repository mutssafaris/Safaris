            </div>
            <div class="data-table-container">
                <table class="data-table">
                    <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Featured</th><th>Actions</th></tr></thead>
                    <tbody id="products-table">
                        <tr><td colspan="6" style="text-align: center; padding: 40px;"><div class="loading"><div class="spinner"></div></div></td></tr>
                    </tbody>
                </table>

    <script src="../js/manager-service.js"></script>
    <script>
    (function() {
        if (!ManagerService.checkAuth()) return;
        
        document.getElementById('logout-btn').addEventListener('click', function(e) { e.preventDefault(); ManagerService.logout(); });
        
        loadProducts();
        
        function loadProducts() {
            var tbody = document.getElementById('products-table');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;"><div class="loading"><div class="spinner"></div></div></td></tr>';
            
            ManagerService.getProducts().then(function(products) {
                renderProducts(products);
            }).catch(function(err) {
                console.error('Error loading products:', err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--error);">Failed to load products</td></tr>';
            });
        }
        
        function renderProducts(products) {
            var tbody = document.getElementById('products-table');
            
            if (!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">No products found</td></tr>';
                return;
            }
            
            var html = '';
            products.forEach(function(p) {
                var catBadge = p.category === 'jewelry' ? 'badge-warning' : p.category === 'art' ? 'badge-info' : 'badge-success';
                html += '<tr>' +
                    '<td><strong>' + p.name + '</strong></td>' +
                    '<td><span class="badge ' + catBadge + '">' + p.category + '</span></td>' +
                    '<td>$' + (p.price || p.productPrice || '-') + '</td>' +
                    '<td>' + (p.stock || p.stockCount || '-') + '</td>' +
                    '<td>' + (p.featured ? '⭐ Yes' : 'No') + '</td>' +
                    '<td class="actions"><a href="edit.html?id=' + p.id + '" class="btn btn-sm btn-secondary">Edit</a></td>' +
                '</tr>';
            });
            tbody.innerHTML = html;
        }
    })();
    </script>
