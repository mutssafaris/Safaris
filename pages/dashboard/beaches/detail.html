<!-- Quote Modal -->
<div id="quote-modal" class="quote-modal">
<div class="quote-modal-content">
<button class="quote-modal-close" onclick="closeQuoteModal()">&times;</button>
<div id="quote-form-container"></div>
</div>

<script src="../../../js/api-config.js"></script>
<script src="../../../js/services/listings-service.js"></script>
<script src="../../../js/dashboard-theme.js"></script>
<script>
(function() {
    var container = document.getElementById('beach-detail');
    var currentBeach = null;
    
    function getBeachSlug() {
        var params = new URLSearchParams(window.location.search);
        if (params.get('beach')) return params.get('beach');
        var path = window.location.pathname;
        var match = path.match(/beaches\/detail\/([^.]+)\.html/);
        return match ? match[1] : null;
    }
    
    window.openQuoteModal = function() {
        var formContainer = document.getElementById('quote-form-container');
        var modal = document.getElementById('quote-modal');
        formContainer.innerHTML = '<h2 style="color:var(--text-primary);margin-bottom:1.5rem;">Request Quote for ' + (currentBeach ? currentBeach.name : 'This Destination') + '</h2>' +
            '<form id="quote-form" onsubmit="submitQuote(event)">' +
                '<div class="form-group"><label>Full Name *</label><input type="text" name="quote-name" required placeholder="Your name"></div>' +
                '<div class="form-group"><label>Email *</label><input type="email" name="quote-email" required placeholder="your@email.com"></div>' +
                '<div class="form-group"><label>Phone</label><input type="tel" name="quote-phone" placeholder="+254..."></div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>Travelers *</label><input type="number" name="quote-travelers" min="1" value="2" required></div>' +
                    '<div class="form-group"><label>Duration *</label><select name="quote-duration" required><option value="">Select</option><option value="3">3 Days</option><option value="5">5 Days</option><option value="7">7 Days</option><option value="10">10+ Days</option></select></div>' +
                '</div>' +
                '<div class="form-row">' +
                    '<div class="form-group"><label>Preferred Date</label><input type="date" name="quote-date"></div>' +
                    '<div class="form-group"><label>Budget per Person ($)</label><select name="quote-budget"><option value="">Any</option><option value="500">$500 - $1000</option><option value="1500">$1000 - $2000</option><option value="3000">$2000 - $4000</option><option value="5000">$4000+</option></select></div>' +
                '</div>' +
                '<div class="form-group"><label>Interests</label><div class="checkbox-group"><label><input type="checkbox" name="quote-interests" value="relaxation"> Relaxation</label><label><input type="checkbox" name="quote-interests" value="adventure"> Adventure</label><label><input type="checkbox" name="quote-interests" value="wildlife"> Wildlife</label><label><input type="checkbox" name="quote-interests" value="culture"> Culture</label></div></div>' +
                '<div class="form-group"><label>Additional Notes</label><textarea name="quote-message" rows="3" placeholder="Any special requirements..."></textarea></div>' +
                '<button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem;">Submit Quote Request</button>' +
            '</form>';
        modal.classList.add('active');
    };
    
    window.closeQuoteModal = function() {
        document.getElementById('quote-modal').classList.remove('active');
    };
    
    window.submitQuote = function(e) {
        e.preventDefault();
        var form = e.target;
        var data = {
            destination: currentBeach.name,
            destinationId: currentBeach.id,
            destinationType: 'beach',
            name: form['quote-name'].value,
            email: form['quote-email'].value,
            phone: form['quote-phone'].value,
            travelers: parseInt(form['quote-travelers'].value),
            duration: form['quote-duration'].value,
            date: form['quote-date'].value,
            budget: form['quote-budget'].value,
            interests: Array.from(form.querySelectorAll('input[name="quote-interests"]:checked')).map(cb => cb.value),
            message: form['quote-message'].value,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        
        // === API READY ===
        // Replace localStorage below with:
        // fetch('/api/quotes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        //   .then(r => { if(r.ok) alert('Quote submitted!'); })
        
        var quotes = JSON.parse(localStorage.getItem('mutssafaris_quotes') || '[]');
        quotes.push({id: 'quote-' + Date.now()});
        localStorage.setItem('mutssafaris_quotes', JSON.stringify(quotes));
        
        alert('Quote request submitted! We will contact you within 24 hours.');
        window.closeQuoteModal();
        form.reset();
    };
    
    function renderBeach(beach) {
        if (!beach) {
            container.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--text-muted);"><h2>Beach Not Found</h2><a href="../beaches.html" class="btn btn-primary">Back to Beaches</a></div>';
            return;
        }
        
        currentBeach = beach;
        document.title = beach.name + ' - Muts Safaris';
        
        var heroImg = beach.hero ? '../../../' + beach.hero : '../../../images/beaches/diani-hero.jpg';
        
        container.innerHTML = 
            '<div class="listing-hero"><h1>' + beach.name + '</h1><p>' + (beach.description || '') + '</p></div>' +
            '<img src="' + heroImg + '" alt="' + beach.name + '" style="width:100%;height:300px;object-fit:cover;margin-bottom:1.5rem;" loading="lazy">' +
            '<div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;">' +
                (beach.badge ? '<span class="listing-badge">' + beach.badge + '</span>' : '') +
                (beach.bestTime ? '<span class="listing-badge">Best Time: ' + beach.bestTime + '</span>' : '') +
                '<button class="btn btn-primary" onclick="openQuoteModal()" style="margin-left:auto;">Request Quote</button>' +
            '</div>' +
            
            '<h2 style="color:var(--text-primary);margin-bottom:0.75rem;">Overview</h2>' +
            '<p style="color:var(--text-secondary);line-height:1.7;margin-bottom:1.5rem;">' + (beach.overview || '') + '</p>' +
            
            (beach.highlights ? '<h2 style="color:var(--text-primary);margin-bottom:0.75rem;">Highlights</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem;">' +
                beach.highlights.map(function(h) { return '<div class="listing-card" style="padding:1rem;"><h3 style="color:var(--text-primary);margin-bottom:0.5rem;">' + h.title + '</h3><p style="color:var(--text-secondary);font-size:0.85rem;">' + h.desc + '</p></div>'; }).join('') + '</div>' : '') +
            
            (beach.activities ? '<h2 style="color:var(--text-primary);margin-bottom:0.75rem;">Key Activities</h2><div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;">' +
                beach.activities.map(function(a) { return '<span style="padding:0.75rem;border:1px solid var(--border-glow);background:var(--bg-card);color:var(--accent);font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;">' + a + '</span>'; }).join('') + '</div>' : '') +
            
            '<div style="margin-top:2rem;"><a href="../beaches.html" class="btn btn-outline">Back to Beaches</a></div>';
    }
    
    function init() {
        container.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--text-muted);">Loading...</div>';
        var slug = getBeachSlug();
        if (window.MutsListingsService && slug) {
            window.MutsListingsService.getBeachByName(slug).then(renderBeach);
        } else {
            container.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--text-muted);"><h2>Unable to Load</h2><a href="../beaches.html" class="btn btn-primary">Back to Beaches</a></div>';
        }
    }
    
    document.getElementById('quote-modal').addEventListener('click', function(e) {
        if (e.target.id === 'quote-modal') window.closeQuoteModal();
    });
    
    init();
})();
</script>

<style>
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; color: var(--text-primary); margin-bottom: 0.5rem; font-size: 0.9rem; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-family: inherit; font-size: 0.9rem; box-sizing: border-box; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 1rem; }
.checkbox-group label { color: var(--text-secondary); display: flex; align-items: center; gap: 0.25rem; cursor: pointer; }
.quote-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-backdrop); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
.quote-modal.active { display: flex; }
.quote-modal-content { background: var(--bg-card); border: 1px solid var(--border-glow); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
.quote-modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
@media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
</style>
