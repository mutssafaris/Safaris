    (function(){var t=localStorage.getItem('muts-safaris-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
    </script>
    <style>
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.25rem;
            padding: 1rem 0;
        }
        .wishlist-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            clip-path: polygon(0 14px, 14px 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .wishlist-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), 0 0 15px var(--shadow-glow);
            transform: translateY(-4px);
        }
        .wishlist-card-image {
            position: relative;
            height: 180px;
            overflow: hidden;
        }
        .wishlist-card-image img {
            filter: brightness(0.85) contrast(1.1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .wishlist-card-image .remove-wishlist-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 184, 0, 0.2);
            color: var(--danger);
            width: 30px;
            height: 30px;
            border-radius: 0;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .wishlist-card-image .remove-wishlist-btn:hover {
            background: rgba(255, 68, 102, 0.2);
            border-color: var(--danger);
        }
        .wishlist-card-image .item-type-badge {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: capitalize;
            letter-spacing: 1px;
        }
        .wishlist-card-content {
            padding: 1rem;
        }
        .wishlist-card-content .item-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 0.25rem;
            color: var(--text-primary);
        }
        .wishlist-card-content .item-price {
            font-size: 0.85rem;
            color: var(--accent);
            margin: 0 0 0.75rem;
        }
        .wishlist-card-content .btn {
            display: block;
            text-align: center;
            padding: 0.6rem 1rem;
            background: var(--accent);
            color: var(--text-on-accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .wishlist-card-content .btn:hover {
            background: var(--accent-dark);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .wishlist-tabs {
            display: flex;
            gap: 0;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 0;
        }
        .wishlist-tab {
            padding: 0.7rem 1.25rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .wishlist-tab:hover {
            color: var(--text-secondary);
        }
        .wishlist-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }
        .wishlist-count {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-left: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .empty-state .btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--text-on-accent);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .empty-state .btn:hover {
            box-shadow: 0 0 15px var(--accent-glow);
        }
    </style>

<script src="../../js/services/hotels-service.js"></script>

<script>
(function() {
    var wishlistGrid = document.getElementById('wishlist-grid');
    var wishlistEmpty = document.getElementById('wishlist-empty');
    var tabBtns = document.querySelectorAll('.wishlist-tab');
    var currentType = 'all';
    var allItemsData = {};

    function updateCounts() {
        var counts = window.MutsWishlistService.getItemsByType();
        var allCount = window.MutsWishlistService.getCount();
        document.getElementById('count-all').textContent = allCount > 0 ? ' (' + allCount + ')' : '';
        document.getElementById('count-product').textContent = counts.product.length > 0 ? ' (' + counts.product.length + ')' : '';
        document.getElementById('count-destination').textContent = counts.destination.length > 0 ? ' (' + counts.destination.length + ')' : '';
        document.getElementById('count-tour').textContent = counts.tour.length > 0 ? ' (' + counts.tour.length + ')' : '';
        document.getElementById('count-hotel').textContent = counts.hotel.length > 0 ? ' (' + counts.hotel.length + ')' : '';
    }

    function renderWishlist() {
        var items = currentType === 'all' 
            ? window.MutsWishlistService.getItems() 
            : window.MutsWishlistService.getItems(currentType);
        
        if (items.length === 0) {
            wishlistGrid.innerHTML = '';
            wishlistEmpty.style.display = 'block';
            return;
        }
        
        wishlistEmpty.style.display = 'none';
        wishlistGrid.innerHTML = '';
        
        var loadedCount = 0;
        var itemsData = {};
        
        items.forEach(function(item) {
            var key = item.type + '_' + item.id;
            var cached = window.MutsWishlistService.getItemDataCache(item.type, item.id);
            if (cached) {
                itemsData[key] = cached;
                loadedCount++;
            } else {
                loadItemData(item.type, item.id, function(data) {
                    if (data) {
                        itemsData[key] = data;
                        window.MutsWishlistService.setItemDataCache(item.type, item.id, data);
                    }
                    loadedCount++;
                    if (loadedCount === items.length) {
                        renderCards(items, itemsData);
                    }
                });
            }
        });
        
        if (loadedCount === items.length) {
            renderCards(items, itemsData);
        }
    }
    
    function renderCards(items, itemsData) {
        wishlistGrid.innerHTML = '';
        items.forEach(function(item) {
            var data = itemsData[item.type + '_' + item.id];
            var card = createWishlistCard(item, data);
            if (card) wishlistGrid.appendChild(card);
        });
        
        if (wishlistGrid.children.length === 0) {
            wishlistEmpty.style.display = 'block';
        }
    }

    function createWishlistCard(item, data) {
        if (!data) {
            data = window.MutsWishlistService.getItemDataCache(item.type, item.id);
        }
        if (!data) {
            var card = document.createElement('div');
            card.className = 'wishlist-card';
            card.innerHTML = 
                '<div class="wishlist-card-content">' +
                    '<h3 class="item-name">' + item.type + ' #' + item.id + '</h3>' +
                    '<p class="item-price">Details unavailable</p>' +
                    '<button class="remove-wishlist-btn" data-type="' + item.type + '" data-id="' + item.id + '" aria-label="Remove from wishlist">Remove</button>' +
                '</div>';
            return card;
        }
        
        var card = document.createElement('div');
        card.className = 'wishlist-card';
        card.dataset.type = item.type;
        card.dataset.id = item.id;
        
        var imgSrc = data.image || (data.images && data.images[0]) || '../../images/placeholder.jpg';
        var name = data.name || data.title || 'Unknown';
        var price = data.price || data.priceRange || 'Varies';
        var actionLink = getActionLink(item.type, data);
        
        card.innerHTML = 
            '<div class="wishlist-card-image">' +
                '<img src="' + imgSrc + '" alt="' + name + '" onerror="this.src=\'../../images/placeholder.jpg\'">' +
                '<button class="remove-wishlist-btn" data-type="' + item.type + '" data-id="' + item.id + '" aria-label="Remove from wishlist">&times;</button>' +
                '<span class="item-type-badge">' + item.type + '</span>' +
            '</div>' +
            '<div class="wishlist-card-content">' +
                '<h3 class="item-name">' + name + '</h3>' +
                '<p class="item-price">' + price + '</p>' +
                '<a href="' + actionLink + '" class="btn btn-primary">View Details</a>' +
            '</div>';
        
        return card;
    }

    function getActionLink(type, data) {
        switch(type) {
            case 'product': return 'africasa.html';
            case 'destination': return 'tours.html?destination=' + (data.slug || '');
            case 'tour': return 'tours/' + (data.slug || '') + '.html';
            case 'hotel': return 'hotels/' + (data.tier || 'luxury') + '/' + (data.slug || '') + '.html';
            default: return '#';
        }
    }

    function loadItemData(type, id, callback) {
        var service = null;
        
        switch(type) {
            case 'product': 
                service = window.MutsAfricasaService; 
                break;
            case 'destination': 
                service = window.MutsDestinationsService; 
                break;
            case 'tour': 
                service = window.MutsToursService; 
                break;
            case 'hotel': 
                service = window.MutsHotelsService; 
                break;
        }
        
        if (service && service.getById) {
            service.getById(id).then(function(data) {
                callback(data);
            }).catch(function() {
                callback(null);
            });
        } else if (service && service.getAll) {
            service.getAll().then(function(allData) {
                var item = null;
                if (allData && allData.destinations) {
                    item = allData.destinations.find(function(d) { return d.id == id; });
                } else if (allData && allData.hotels) {
                    item = allData.hotels.find(function(h) { return h.id == id; });
                } else if (Array.isArray(allData)) {
                    item = allData.find(function(i) { return i.id == id; });
                }
                callback(item);
            }).catch(function() {
                callback(null);
            });
        } else {
            callback(null);
        }
    }

    function initTabs() {
        tabBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                tabBtns.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentType = btn.dataset.type;
                renderWishlist();
            });
        });
    }

    function initRemoveButtons() {
        wishlistGrid.addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-wishlist-btn')) {
                var type = e.target.dataset.type;
                var id = e.target.dataset.id;
                window.MutsWishlistService.removeItem(type, id);
                updateCounts();
                renderWishlist();
            }
        });
    }

    function init() {
        if (window.MutsWishlistService) {
            window.MutsWishlistService.init();
            updateCounts();
            renderWishlist();
            initTabs();
            initRemoveButtons();
            
            window.addEventListener('wishlist-changed', function() {
                updateCounts();
                renderWishlist();
            });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
