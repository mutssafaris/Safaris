    <meta property="og:title" content="Muts Safaris - Premium African Safari Experiences">
    <meta property="og:description" content="Explore Kenya's most spectacular destinations with Muts Safaris. Book your dream safari adventure today.">

    <meta property="og:image" content="https://mutssafaris.com/assets/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Muts Safaris - Premium African Safari Experiences">
    <meta name="twitter:description" content="Explore Kenya's most spectacular destinations with Muts Safaris.">
    <link rel="canonical" href="https://mutssafaris.com/">
    <link rel="alternate" hreflang="en" href="https://mutssafaris.com/">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Muts Safaris",
        "description": "Premium African Safari Experiences in Kenya",
        "url": "https://mutssafaris.com",
        "logo": "https://mutssafaris.com/assets/images/logo.png",
        "image": "https://mutssafaris.com/assets/images/og-image.jpg",
        "telephone": "+254700000000",
        "email": "info@mutssafaris.com",
        "address": {
            "@type": "PostalAddress",
            "addressCountry": "KE",
            "addressRegion": "Nairobi"
        },
        "areaServed": {
            "@type": "Country",
            "name": "Kenya"
        },
        "sameAs": [
            "https://facebook.com/mutssafaris",
            "https://instagram.com/mutssafaris",
            "https://twitter.com/mutssafaris"
        ],
        "priceRange": "$$"
    }
    </script>
    <title>Muts Safaris - Initializing Terminal</title>
    <link rel="stylesheet" href="css/themes.css">
    <link rel="icon" href="assets/favicon/favicon.ico">
    <script>
        (function () {
            var theme = 'light';
            try {
                var stored = localStorage.getItem('muts-safaris-theme');
                if (stored === 'dark' || stored === 'light') {
                    theme = stored;
                }
            } catch (e) {}
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', theme === 'dark' ? '#050510' : '#f8fbff');
        })();
    </script>
    <style>
        body {
            margin: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-family);
            color: var(--accent);
        }
        .loader {
            text-align: center;
        }
        .loader h1 {
            color: var(--text-white);
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .status-text {
            color: var(--accent);
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 184, 0, 0.1);
            margin: 1.5rem auto;
            position: relative;
            overflow: hidden;
        }
        .loading-progress {
            position: absolute;
            width: 50px;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px #FFB800;
            animation: move 1.5s infinite ease-in-out;
        }
        @keyframes move {
            0% { left: -50px; }
            100% { left: 200px; }
        }
    </style>
</head>
<body>
    <div class="loader">
        <h1>MUTS_SAFARIS</h1>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <p class="status-text">VALIDATING_SESSION...</p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.MutsAuth && window.MutsAuth.getSession()) {
                setTimeout(function() {
                    window.location.href = 'pages/dashboard/index.html';
                }, 800);
            } else {
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 800);
            }
        });
        
        // Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/js/sw.js').then(function(reg) {
                    console.log('[App] Service Worker registered:', reg.scope);
                }).catch(function(err) {
                    console.log('[App] SW registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
